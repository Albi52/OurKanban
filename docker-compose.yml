
services:

  mysql:
    image: mysql:8

    container_name: ourkanban-mysql

    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ourkanban
      MYSQL_USER: ourkanban
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data: