# =========================
# APPLICATION NAME
# =========================
spring.application.name=ourkanban


# =========================
# DATABASE (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/ourkanban?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
#Cambiar esto
spring.datasource.password=hehe
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================
# JPA / HIBERNATE
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =========================
# JWT CONFIG (custom)
# =========================
#Cambiar esto

jwt.secret=CHANGE_THIS_TO_A_LONG_RANDOM_SECRET_KEY
jwt.expiration=86400000


# =========================
# GOOGLE OAUTH2 LOGIN
# =========================
#Cambiar esto
spring.security.oauth2.client.registration.google.client-id=YOUR_GOOGLE_CLIENT_ID
#Cambiar esto
spring.security.oauth2.client.registration.google.client-secret=YOUR_GOOGLE_CLIENT_SECRET
spring.security.oauth2.client.registration.google.scope=openid,profile,email


# =========================
# SERVER CONFIG (optional)
# =========================
server.port=8080


# =========================
# DEBUG (optional but useful)
# =========================
logging.level.org.springframework.security=DEBUG

spring.datasource.hikari.connection-timeout=5000