# =========================
# APPLICATION NAME
# =========================
spring.application.name=ourkanban

spring.config.import=optional:application-secrets.properties

# =========================
# DATABASE (MySQL)
# =========================
spring.datasource.url=jdbc:mysql://localhost:3306/ourkanban?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================
# JPA / HIBERNATE
# =========================
#spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# =========================
# JWT CONFIG (custom)
# =========================
#Cambiar esto

jwt.expiration=86400000


# =========================
# GOOGLE OAUTH2 LOGIN
# =========================
### Secret ### google.client-id=
google.scope=openid,profile,email


# =========================
# EMAIL CONFIG
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

### Secret ### spring.mail.username=
### Secret ### spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=http://localhost:5173

# =========================
# SERVER CONFIG (optional)
# =========================
server.port=8080


# =========================
# DEBUG (optional but useful)
# =========================
logging.level.org.springframework.security=DEBUG

spring.datasource.hikari.connection-timeout=5000

logging.level.org.springframework.security=DEBUG